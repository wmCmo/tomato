<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Redirecting&hellip;</title>
    <script>
        // Single-page app redirect for GitHub Pages
        // Converts the path after the repo name into a query-string so the
        // main index.html can restore it with history.replaceState before
        // React Router boots.
        //
        // segmentCount = 1 keeps "/tomato" (the repo path prefix) and only
        // encodes the rest (e.g. /profile/abc → ?/profile/abc).
        var segmentCount = 1;

        var l = window.location;
        l.replace(
            l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
            l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?' +
            l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
            (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash
        );
    </script>
</head>

<body>
    Redirecting&hellip;
</body>

</html>
